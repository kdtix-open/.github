name: Bug report
description: Report a reproducible problem or regression.
title: "[Bug]: "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Before submitting, please search existing issues to avoid duplicates.
  - type: textarea
    id: bug-description
    attributes:
      label: Bug description
      description: What is happening? Include the impact and any error messages.
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the exact steps someone else can follow to reproduce the problem.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Enter '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
      placeholder: A clear and concise description of the expected result.
    validations:
      required: true
  - type: textarea
    id: environment-details
    attributes:
      label: Environment details
      description: Include anything relevant such as OS, browser, app version, runtime, device, or deployment target.
      placeholder: |
        - OS:
        - Browser:
        - App version:
        - Runtime / SDK:
        - Device / Environment:
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add screenshots, logs, links, or any other context that may help.
      placeholder: Paste logs, link related issues, or add anything else that may help us investigate.
    validations:
      required: false
  - type: checkboxes
    id: bug-checks
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched the existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this on the latest available version.
          required: false